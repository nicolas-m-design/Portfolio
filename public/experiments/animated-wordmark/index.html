<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/experiments/animated-wordmark/">
<title>Animated Wordmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wordmark.css?v=6">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Space Grotesk', sans-serif;
  }
</style>
</head>
<body>

<a href="/experiments"
   style="position:fixed;top:2rem;left:2rem;z-index:999;display:inline-flex;align-items:center;padding:.75rem 1.25rem;border-radius:9999px;font-family:'Space Grotesk',sans-serif;font-size:.875rem;text-decoration:none;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:background .2s;"
   onmouseover="this.style.background='rgba(255,255,255,.2)'"
   onmouseout="this.style.background='rgba(255,255,255,.1)'"
>← Experiments</a>

<div
  data-wordmark
  data-text="Dialogue"
  data-preset="bw"
  data-panel="true"
  data-editable="true"
  style="font-size: 13vw;"
></div>

<script src="presets.js?v=6"></script>
<script src="wordmark.js?v=6"></script>
<script>
  function centerWordmark() {
    var el    = document.querySelector('[data-wordmark]');
    if (!el) return;
    var panel = document.querySelector('.wm-panel');
    var elH   = el.getBoundingClientRect().height;
    var panH  = panel ? panel.getBoundingClientRect().height : 0;
    var gap   = 80;
    var total = elH + (panel ? gap + panH : 0);
    var startY = Math.round((window.innerHeight - total) / 2) + 48;

    el.style.position  = 'fixed';
    el.style.top       = Math.round(startY + elH / 2) + 'px';
    el.style.left      = '50%';
    el.style.transform = 'translate(-50%, -50%)';
    el.style.margin    = '0';

    if (panel) {
      panel.style.bottom = 'auto';
      panel.style.top    = Math.round(startY + elH + gap) + 'px';
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', centerWordmark);
  } else {
    centerWordmark();
  }
  // Re-center after wordmark.js relayout with correct font metrics
  document.querySelector('[data-wordmark]').addEventListener('wordmark:ready', centerWordmark);
</script>

</body>
</html>
