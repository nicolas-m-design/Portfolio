<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 928" role="img" aria-label="Factory Design System cover">
  <defs>
    <filter id="elevation-sm" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#1A1A18" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #FAF9F8; }
      .ink { fill: #1A1A18; }
      .muted { fill: #6B6760; }
      .orange { fill: #E8520A; }
      .eyebrow { font: 700 16px ui-monospace, "Geist Mono", monospace; letter-spacing: 3px; }
      .hero-xl { font: 700 108px ui-monospace, "Geist Mono", monospace; letter-spacing: -2px; }
      .hero-md { font: 700 92px ui-monospace, "Geist Mono", monospace; letter-spacing: -2px; }
      .body-lg { font: 500 24px ui-monospace, "Geist Mono", monospace; }
      .detail { font: 700 14px ui-monospace, "Geist Mono", monospace; }
      .accent-line { animation: accentPulse 7s ease-in-out infinite; }
      @keyframes accentPulse {
        0%, 100% { opacity: 0.82; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .accent-line { animation: none; }
      }
    </style>
  </defs>

  <rect width="1600" height="928" class="bg"/>

  <!-- Header -->
  <text x="104" y="140" class="eyebrow orange">CASE STUDY</text>
  <rect x="104" y="156" width="112" height="4" class="orange accent-line"/>
  <text x="104" y="298" class="hero-xl ink">Factory</text>
  <text x="104" y="400" class="hero-md ink">Design System</text>
  <text x="104" y="482" class="body-lg muted">Keeping Figma and React in sync with a markdown contract,</text>
  <text x="104" y="518" class="body-lg muted">token discipline, and AI agents that execute without drift.</text>

  <!-- Meta rail -->
  <text x="104" y="618" class="detail orange">SYSTEM</text>
  <text x="196" y="618" class="detail muted">DESIGN.md</text>
  <text x="314" y="618" class="detail muted">/</text>
  <text x="340" y="618" class="detail muted">FIGMA MCP</text>
  <text x="480" y="618" class="detail muted">/</text>
  <text x="506" y="618" class="detail muted">REACT 19</text>
  <text x="620" y="618" class="detail muted">/</text>
  <text x="646" y="618" class="detail muted">SPEC APP</text>
</svg>
