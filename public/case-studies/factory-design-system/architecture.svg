<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-label="Three-layer token pipeline: primitives, semantics, and components">
  <defs>
    <filter id="elevation-sm" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#1A1A18" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #FAF9F8; }
      .ink { fill: #1A1A18; }
      .muted { fill: #6B6760; }
      .orange { fill: #E8520A; }
      .soft-line { fill: none; stroke: #D8D4CD; stroke-width: 1; }
      .stage-box { fill: #FFFFFF; stroke: #D8D4CD; stroke-width: 1; filter: url(#elevation-sm); }
      .rule-box { fill: #FAF9F8; stroke: #D8D4CD; stroke-width: 1; }
      .eyebrow { font: 700 15px ui-monospace, "Geist Mono", monospace; letter-spacing: 3px; }
      .hero { font: 700 44px ui-monospace, "Geist Mono", monospace; letter-spacing: -1px; }
      .intro { font: 500 19px ui-monospace, "Geist Mono", monospace; }
      .title { font: 700 29px ui-monospace, "Geist Mono", monospace; }
      .body { font: 500 15px ui-monospace, "Geist Mono", monospace; }
      .body-sm { font: 500 13px ui-monospace, "Geist Mono", monospace; }
      .detail { font: 700 14px ui-monospace, "Geist Mono", monospace; }
      .accent-line { animation: accentPulse 7s ease-in-out infinite; }
      @keyframes accentPulse {
        0%, 100% { opacity: 0.82; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .accent-line { animation: none; }
      }
    </style>
  </defs>

  <rect width="1600" height="920" class="bg"/>

  <!-- Header -->
  <text x="104" y="162" class="hero ink">Three token layers prevent drift</text>
  <text x="104" y="214" class="intro muted">Primitives hold values, semantics hold intent, and components are only allowed to read the semantic layer.</text>

  <!-- Stage 1 -->
  <rect x="104" y="286" width="420" height="500" class="stage-box"/>
  <text x="136" y="332" class="eyebrow orange">01 / PRIMITIVES</text>
  <rect x="136" y="346" width="132" height="4" class="orange accent-line" style="animation-delay: -1.6s"/>
  <text x="136" y="408" class="title ink">Raw values only</text>
  <text x="136" y="442" class="body muted">Concrete, reusable values.</text>
  <text x="136" y="468" class="body muted">No product meaning yet.</text>
  <line x1="136" y1="504" x2="492" y2="504" class="soft-line"/>
  <text x="136" y="548" class="detail ink">primitive-color-orange-9</text>
  <text x="136" y="574" class="body muted">#E8520A</text>
  <text x="136" y="620" class="detail ink">primitive-space-4</text>
  <text x="136" y="646" class="body muted">16px</text>
  <text x="136" y="692" class="detail ink">primitive-radius-none</text>
  <text x="136" y="718" class="body muted">0px</text>

  <!-- Stage 2 -->
  <rect x="554" y="286" width="420" height="500" class="stage-box"/>
  <text x="586" y="332" class="eyebrow orange">02 / SEMANTICS</text>
  <rect x="586" y="346" width="132" height="4" class="orange accent-line" style="animation-delay: -3.2s"/>
  <text x="586" y="408" class="title ink">Intent over value</text>
  <text x="586" y="442" class="body muted">Roles map raw tokens into intent.</text>
  <text x="586" y="468" class="body muted">Components consume this layer.</text>
  <line x1="586" y1="504" x2="942" y2="504" class="soft-line"/>
  <text x="586" y="548" class="detail ink">color-action-primary</text>
  <text x="586" y="574" class="body muted">→ primitive-color-orange-9</text>
  <text x="586" y="620" class="detail ink">layout-section-gap</text>
  <text x="586" y="646" class="body muted">→ primitive-space-8</text>
  <text x="586" y="692" class="detail ink">radius-control</text>
  <text x="586" y="718" class="body muted">→ primitive-radius-none</text>

  <!-- Stage 3 -->
  <rect x="1004" y="286" width="420" height="500" class="stage-box"/>
  <text x="1036" y="332" class="eyebrow orange">03 / COMPONENTS</text>
  <rect x="1036" y="346" width="138" height="4" class="orange accent-line" style="animation-delay: -4.8s"/>
  <text x="1036" y="408" class="title ink">Semantic-only UI</text>
  <text x="1036" y="442" class="body muted">Components consume semantic tokens only.</text>
  <text x="1036" y="468" class="body muted">Primitives never enter UI code directly.</text>

  <g transform="translate(1036 504) scale(2)">
    <rect x="0.5" y="0.5" width="120" height="48" fill="#E8520A"/>
    <rect x="0.5" y="0.5" width="120" height="48" fill="none" stroke="#E8520A" stroke-miterlimit="10" stroke-linejoin="bevel"/>
