0.896C78.4097 30.8107 78.5217 30.6667 78.5964 30.464L78.8844 29.712H78.3404L75.2364 21.488H76.9804L79.3964 28.192L81.6524 21.488H83.3804L79.9884 30.96C79.8177 31.472 79.551 31.84 79.1884 32.064C78.8364 32.288 78.3617 32.4 77.7644 32.4H76.5644Z" fill="white"/>
    <path d="M99.2814 23.8333L95.7054 20.2573L96.648 19.3147L101.833 24.5L96.648 29.6853L95.7054 28.7427L99.2814 25.1667H91.1667V23.8333H99.2814Z" fill="white"/>
  </g>

  <text x="1036" y="652" class="body-sm muted">background: var(--color-action-primary)</text>
  <text x="1036" y="676" class="body-sm muted">padding: var(--space-control-md)</text>
  <text x="1036" y="700" class="body-sm muted">border-radius: var(--radius-control)</text>

  <rect x="1036" y="730" width="312" height="34" rx="2" class="rule-box"/>
  <text x="1052" y="752" class="body-sm orange">RULE: no var(--primitive-*) here</text>
</svg>
