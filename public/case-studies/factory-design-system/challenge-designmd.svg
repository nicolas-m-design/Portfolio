  <!-- Code excerpt -->
  <text x="456" y="256" class="code-strong ink"># Factory Design System</text>
  <text x="456" y="290" class="code-strong ink">## 1. Visual Theme &amp; Atmosphere</text>
  <text x="456" y="324" class="code muted">Factory is a restrained, code-adjacent interface system built around</text>
  <text x="456" y="358" class="code muted">Geist Mono, warm orange actions, ink-black typography, and flat bordered surfaces.</text>
  <text x="456" y="392" class="code-strong ink">### Canonical design language</text>
  <text x="456" y="426" class="code muted">- Primary accent: orange (`action.primary`) for action, emphasis, and active indicators.</text>
  <text x="456" y="460" class="code muted">- Surfaces: flat, square, lightly bordered, no rounded corners except pill badges.</text>
  <text x="456" y="494" class="code muted">- Depth: almost entirely border-led, not shadow-led.</text>
  <text x="456" y="562" class="code-strong ink">### Shape and borders</text>
  <text x="456" y="596" class="code muted">- Radius: `0px` for almost all components</text>
  <text x="456" y="630" class="code muted">- Default border: `1px`</text>
  <text x="456" y="664" class="code muted">- Use semantic tokens in components; do not use raw hex values.</text>

  <!-- Lower prompt / cue -->
  <rect x="404" y="760" width="1048" height="88" rx="6" class="pill"/>
  <text x="436" y="796" class="eyebrow orange">AGENT PROMPT</text>
  <text x="436" y="828" class="ui ink">“Use the Factory Design System with Geist Mono, orange primary actions, ink-black text,</text>
  <text x="436" y="852" class="ui ink">flat bordered white surfaces, and no rounded corners except pill badges.”</text>
